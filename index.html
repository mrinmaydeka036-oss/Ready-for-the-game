<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Are You Ready?</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial,sans-serif;
color:white;
overflow:hidden;
}

#question{
text-align:center;
}

h1{
font-size:3rem;
margin-bottom:30px;
}

button{
padding:15px 35px;
margin:10px;
font-size:20px;
border:none;
border-radius:50px;
cursor:pointer;
transition:.3s;
}

.yes{
background:#00c853;
color:white;
}

.no{
background:#d50000;
color:white;
}

button:hover{
transform:scale(1.08);
}

#videoContainer{
display:none;
width:100%;
height:100%;
}

video{
width:100%;
height:100%;
object-fit:cover;
}
</style>

</head>
<body>

<div id="question">
<h1>Are you ready?😈</h1>

<button class="yes" onclick="playVideo()">💀 Yes</button>

<button class="no" onclick="playVideo()">🤡 No</button>

</div>

<div id="videoContainer">
<video id="myVideo" playsinline>
<source src="cid.mp4" type="video/mp4">
</video>
</div>

<script>
function playVideo(){

document.getElementById("question").style.display="none";
document.getElementById("videoContainer").style.display="block";

const video=document.getElementById("myVideo");

video.muted=false;
video.volume=1;

video.play();

}
</script>

</body>
</html>
